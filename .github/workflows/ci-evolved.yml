name: CI Évolué – Slim, CRITICAL Block & Email (dev)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  env:
  IMAGE_NAME: tidianesar09/intranet-newdeal
  IMAGE_TAG: ${{ github.sha }}
  BASE_IMAGE: nginx:alpine3.23-slim

jobs:

  build:
    name: 🐳 Build Image Docker (nginx:alpine3.23)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image Docker
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Sauvegarder l'image
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  security-scan:
    name: 🔒 Scan Sécurité (Bloque si CRITICAL)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      - name: Scan Trivy – BLOQUE si CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL

      - name: Scan secrets Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  push:
    name: 📤 Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push vers Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          

  notify-success:
    name: 📧 Notification Email – Succès
    runs-on: ubuntu-latest
    needs: push
    if: success()

    steps:
      - name: Envoyer email de succès
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [CI Intranet MCEN] Pipeline réussi – ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: DevOps MCEN <${{ secrets.MAIL_USERNAME }}>
          body: |
            Bonjour,

            Le pipeline CI s'est exécuté avec succès.

            Projet   : intranet-newdeal
            Branche  : ${{ github.ref_name }}
            Image    : ${{ env.IMAGE_NAME }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}

            Jobs exécutés :
            ✅ Build Docker
            ✅ Scan sécurité – Aucune vulnérabilité CRITICAL
            ✅ Push Docker Hub

            Cordialement,
            L'équipe DevOps – MCEN Sénégal

  notify-failure:
    name: 📧 Notification Email – Échec
    runs-on: ubuntu-latest
    needs: [build, security-scan, push]
    if: failure()

    steps:
      - name: Envoyer email d'échec
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [CI Intranet MCEN] ÉCHEC pipeline – ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: DevOps MCEN <${{ secrets.MAIL_USERNAME }}>
          body: |
            ALERTE – Échec du pipeline CI

            Projet  : intranet-newdeal
            Branche : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Auteur  : ${{ github.actor }}

            Consultez les logs :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Cordialement,
            L'équipe DevOps – MCEN Sénégal
