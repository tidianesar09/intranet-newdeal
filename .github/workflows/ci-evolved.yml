# ============================================================
# PIPELINE CI ÉVOLUÉ – Branche dev
# Évolutions : image slim + blocage CRITICAL + notif email
# ============================================================
name: CI Évolué – Slim, CRITICAL Block & Email (dev)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal
  IMAGE_TAG: ${{ github.sha }}
  # Évolution 1 : image slim
  BASE_IMAGE: nginx:alpine3.23-slim

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : Build avec nginx:alpine3.23-slim
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build Image Slim (nginx:alpine3.23-slim)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Modifier le Dockerfile pour utiliser l'image slim
        run: |
          sed -i 's|FROM nginx:alpine3.23|FROM nginx:alpine3.23-slim|' Dockerfile
          echo "Image de base modifiée :"
          head -5 Dockerfile

      - name: Build de l'image Docker slim
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-slim \
            --tag ${{ env.IMAGE_NAME }}:latest-slim \
            .

      - name: Afficher la taille de l'image
        run: docker images ${{ env.IMAGE_NAME }}

      - name: Sauvegarder l'image
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-slim | gzip > image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-slim
          path: image.tar.gz
          retention-days: 1


  # ─────────────────────────────────────────────
  # JOB 2 : Scan – BLOQUE si CRITICAL (évolution 2)
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔒 Scan Sécurité (Bloque si CRITICAL)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-slim

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      # Évolution 2 : exit-code 1 → bloque le pipeline si CRITICAL
      - name: Scan Trivy – BLOQUE si vulnérabilité CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-slim
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Scan Trivy complet (informationnel)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-slim
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload rapport SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Scan secrets Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true


  # ─────────────────────────────────────────────
  # JOB 3 : Push vers Docker Hub
  # ─────────────────────────────────────────────
  push:
    name: 📤 Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-slim

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push vers Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-slim
          docker push ${{ env.IMAGE_NAME }}:latest-slim


  # ─────────────────────────────────────────────
  # Évolution 3 : Notification email (succès ou échec)
  # ─────────────────────────────────────────────
  notify-success:
    name: 📧 Notification Email – Succès
    runs-on: ubuntu-latest
    needs: push
    if: success()

    steps:
      - name: Envoyer email de succès
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [CI Intranet MCEN] Pipeline réussi – ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: DevOps MCEN <devops@communication.gouv.sn>
          body: |
            Bonjour,

            Le pipeline CI de l'Intranet New Deal s'est exécuté avec succès.

            ────────────────────────────────
            📌 Projet    : intranet-newdeal
            🌿 Branche   : ${{ github.ref_name }}
            📦 Image     : ${{ env.IMAGE_NAME }}:latest-slim
            🔖 Commit    : ${{ github.sha }}
            👤 Auteur    : ${{ github.actor }}
            ⏰ Date      : ${{ github.event.head_commit.timestamp }}
            ────────────────────────────────

            ✅ Build     : OK
            ✅ Scan      : Aucune vulnérabilité CRITICAL
            ✅ Push Hub  : Image publiée sur Docker Hub

            Cordialement,
            L'équipe DevOps – MCEN Sénégal

  notify-failure:
    name: 📧 Notification Email – Échec
    runs-on: ubuntu-latest
    needs: [build, security-scan, push]
    if: failure()

    steps:
      - name: Envoyer email d'échec
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [CI Intranet MCEN] ÉCHEC du pipeline – ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: DevOps MCEN <devops@communication.gouv.sn>
          body: |
            ALERTE – Échec du pipeline CI

            ────────────────────────────────
            📌 Projet    : intranet-newdeal
            🌿 Branche   : ${{ github.ref_name }}
            🔖 Commit    : ${{ github.sha }}
            👤 Auteur    : ${{ github.actor }}
            ⏰ Date      : ${{ github.event.head_commit.timestamp }}
            ────────────────────────────────

            ❌ Le pipeline a échoué. Veuillez consulter les logs GitHub Actions :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Action requise : vérifier les vulnérabilités détectées ou les erreurs de build.

            Cordialement,
            L'équipe DevOps – MCEN Sénégal
