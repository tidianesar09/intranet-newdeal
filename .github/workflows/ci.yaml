name: CI Evolue Slim CRITICAL Block Email dev

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  IMAGE_NAME: tidianesar09/intranet-newdeal
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build:
    name: Build Image Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l image Docker
        run: |
          IMG="tidianesar09/intranet-newdeal"
          TAG="${{ github.sha }}"
          docker build --tag "$IMG:$TAG" --tag "$IMG:latest" .

      - name: Sauvegarder l image
        run: |
          IMG="tidianesar09/intranet-newdeal"
          TAG="${{ github.sha }}"
          docker save "$IMG:$TAG" "$IMG:latest" | gzip > image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  security-scan:
    name: Scan Securite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Telecharger l artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l image Docker
        run: docker load < image.tar.gz

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL

      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  push:
    name: Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Telecharger l artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l image Docker
        run: docker load < image.tar.gz

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push vers Docker Hub
        run: |
          IMG="tidianesar09/intranet-newdeal"
          TAG="${{ github.sha }}"
          docker push "$IMG:$TAG"
          docker push "$IMG:latest"

  notify-success:
    name: Notification Email Succes
    runs-on: ubuntu-latest
    needs: push
    if: success()
    steps:
      - name: Envoyer email de succes
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Pipeline CI reussi
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: Pipeline OK. Branche ${{ github.ref_name }}. Commit ${{ github.sha }}

  notify-failure:
    name: Notification Email Echec
    runs-on: ubuntu-latest
    needs: [build, security-scan, push]
    if: failure()
    steps:
      - name: Envoyer email d echec
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Pipeline CI en echec
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: Pipeline ECHEC. Branche ${{ github.ref_name }}. Commit ${{ github.sha }}
