name: CI Pipeline dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        run: |
          IMG="tidianesar09/intranet-newdeal"
          TAG="${{ github.sha }}"
          docker build --tag "$IMG:$TAG" --tag "$IMG:latest" .
          docker save "$IMG:$TAG" "$IMG:latest" | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load < image.tar.gz
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push
        run: |
          IMG="tidianesar09/intranet-newdeal"
          TAG="${{ github.sha }}"
          docker push "$IMG:$TAG"
          docker push "$IMG:latest"
