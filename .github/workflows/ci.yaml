name: CI dev

on:
  push:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build et save
        run: |
          docker build -t tidianesar09/intranet-newdeal:${{ github.sha }} -t tidianesar09/intranet-newdeal:latest .
          docker save tidianesar09/intranet-newdeal:${{ github.sha }} tidianesar09/intranet-newdeal:latest | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load < image.tar.gz
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: |
          docker push tidianesar09/intranet-newdeal:${{ github.sha }}
          docker push tidianesar09/intranet-newdeal:latest
