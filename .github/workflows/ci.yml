# ============================================================
# PIPELINE CI – Branche dev
# Intranet New Deal Technologique – MCEN Sénégal
# ============================================================
name: CI – Build, Scan & Push (dev)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : Build de l'image Docker
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build Image Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image Docker (nginx:alpine3.23)
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Sauvegarder l'image pour les jobs suivants
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > image.tar.gz

      - name: Upload de l'artifact image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1


  # ─────────────────────────────────────────────
  # JOB 2 : Scan de sécurité (vulnérabilités + secrets)
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔒 Scan Sécurité (Trivy + Gitleaks)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      # Scan des vulnérabilités avec Trivy
      - name: Scan des vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'

      # Rapport Trivy en SARIF (pour GitHub Security)
      - name: Rapport Trivy SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload du rapport SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      # Scan des secrets avec Gitleaks
      - name: Scan des secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Résumé du scan
        run: |
          echo "✅ Scan de sécurité terminé"
          echo "📋 Image analysée : ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "🔍 Outils utilisés : Trivy (CVE) + Gitleaks (secrets)"


  # ─────────────────────────────────────────────
  # JOB 3 : Push vers Docker Hub
  # ─────────────────────────────────────────────
  push:
    name: 📤 Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Télécharger l'artifact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load < image.tar.gz

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push de l'image vers Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          

      - name: Résumé du push
        run: |
          echo "🚀 Image publiée avec succès !"
          echo "📦 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "📦 ${{ env.IMAGE_NAME }}:latest"
